<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Obfuscated</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #000;
    }

    @keyframes pulse-gradient {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.1); opacity: 1; }
    }

    .bg-corner-glow {
      position: absolute;
      top: -100px;
      left: -100px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, #3b82f6, transparent 70%);
      filter: blur(100px);
      animation: pulse-gradient 6s ease-in-out infinite;
      z-index: -10;
    }

    .swirl-border {
      position: relative;
      background: conic-gradient(from 0deg, #3b82f6, #06b6d4, #67e8f9, #3b82f6);
      background-size: 200% 200%;
      animation: swirl-gradient 5s linear infinite;
      border-radius: 9999px;
      padding: 3px;
      display: inline-block;
      z-index: 0;
      transition: transform 0.3s ease;
    }

    .swirl-border .inner {
      background-color: #000;
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 9999px;
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      font-weight: 600;
      position: relative;
      z-index: 1;
    }

    .notification {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background-color: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(8px);
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 0.875rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease, transform 0.4s ease;
      z-index: 50;
    }

    .notification.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
      pointer-events: auto;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 relative overflow-hidden">

  <div class="bg-corner-glow"></div>

  <div id="notification" class="notification">
    Redirecting...
  </div>

  <div class="text-center max-w-md relative z-10">
    <h1 class="text-white font-extrabold text-4xl sm:text-5xl leading-tight">
      You are not allowed
      <span class="block text-transparent bg-clip-text bg-gradient-to-r from-blue-500 to-cyan-400">
        to view this script.
      </span>
    </h1>
    <p class="text-gray-400 mt-6 text-lg sm:text-xl font-normal leading-relaxed">
      Mind joining MoonVeil discord server?
    </p>

    <div class="flex justify-center gap-4 mt-10 flex-wrap">
      <div id="swirlButton" class="swirl-border">
        <button onclick="handleClick()" class="inner">
          <i class="fas fa-times"></i>
          <span>No
        </button>
      </div>
      <div class="swirl-border">
        <button onclick="joinDiscord()" class="inner">
          <i class="fas fa-check-circle fa-lg"></i>
          <span>Sure!</span>
        </button>
      </div>
    </div>
  </div>

  <script>
    function showNotification(text) {
      const note = document.getElementById("notification");
      const btn = document.getElementById("swirlButton");

      note.textContent = text || "Going . . .";
      btn.classList.add("clicked");
      note.classList.add("show");

      setTimeout(() => {
        note.classList.remove("show");
      }, 2000);
    }

    function handleClick() {
      showNotification("Leaving. . .");
      setTimeout(() => {
        location.replace("https://google.com");
      }, 500);
    }

    function joinDiscord() {
      showNotification("Opening Discord..");
      setTimeout(() => {
        window.open("https://discord.gg/k7FszrXNAJ", "_blank");
      }, 500);
    }
  </script>
</body>
</html>
