<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Invalid Page</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #000;
    }

    .bg-corner-glow {
      position: absolute;
      top: -100px;
      left: -100px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, #f59e0b, transparent 70%);
      filter: blur(70px);
      z-index: -10;
    }

    .swirl-border {
      position: relative;
      background: conic-gradient(from 0deg, #f59e0b, #fbbf24, #fcd34d, #f59e0b);
      background-size: 300% 300%;
      border-radius: 9999px;
      padding: 3px;
      display: inline-block;
      z-index: 0;
    }

    .swirl-border .inner {
      background-color: #000;
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 9999px;
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      font-weight: 600;
      position: relative;
      z-index: 1;
    }

    .notification {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background-color: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(8px);
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 0.875rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease, transform 0.4s ease;
      z-index: 50;
    }

    .notification.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
      pointer-events: auto;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 relative overflow-hidden">

  <div class="fixed top-4 left-4 text-yellow-500 text-xl font-bold flex items-center gap-2 z-50">
    <i class="fas fa-question-circle"></i>
    403 not found page
  </div>

  <div class="bg-corner-glow"></div>

  <div id="notification" class="notification">
    Redirecting...
  </div>

  <div class="text-center max-w-md relative z-10">
    <h1 class="text-white font-extrabold text-4xl sm:text-5xl leading-tight">
      This site is not valid
      <span class="block text-yellow-500">
        or didn't added yet.
      </span>
    </h1>
    <p class="text-gray-400 mt-6 text-lg sm:text-xl font-normal leading-relaxed">
      Well, would you like to join this discord server?
    </p>

    <div class="flex gap-4 justify-center mt-10">
      <div id="swirlButton" class="swirl-border">
        <button onclick="handleClick()" class="inner">
          <i class="fas fa-times"></i>
          <span>No thanks.</span>
        </button>
      </div>
      
      <!-- New Discord button -->
      <div id="discordButton" class="swirl-border">
        <button onclick="redirectToDiscord()" class="inner">
          <i class="fas fa-check-circle fa-lg"></i>
          <span>Of course</span>
        </button>
      </div>
    </div>
  </div>

  <script>
    function showNotification(text) {
      const note = document.getElementById("notification");
      note.textContent = text || "Going . . .";
      note.classList.add("show");

      setTimeout(() => {
        note.classList.remove("show");
      }, 2000);
    }

    function handleClick() {
      showNotification("Leaving..");
      setTimeout(() => {
        location.replace("https://google.com");
      }, 500);
    }

    function redirectToDiscord() {
      window.open("https://discord.gg/k7FszrXNAJ", "_blank");
    }
  </script>
</body>
</html>
